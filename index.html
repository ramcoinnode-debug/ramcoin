<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMCOIN Explorer v1.0.0</title>
    <meta name="description" content="RAMCOIN Block Explorer — CPU-only cryptocurrency">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐏</text></svg>">
    <style>
        :root { --bg: #02040a; --card: #0a0f1a; --border: #1a2030; --green: #10b981; --blue: #38bdf8; --gold: #fbbf24; --text: #f1f5f9; --text2: #94a3b8; --red: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        nav { background: rgba(2,4,10,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .logo { font-size: 1.4em; font-weight: 900; color: var(--green); }
        .status { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(16,185,129,0.1); border-radius: 50px; border: 1px solid rgba(16,185,129,0.3); font-size: 0.7em; font-weight: 700; }
        .dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .container { max-width: 960px; margin: 0 auto; padding: 15px; }
        
        .search { display: flex; gap: 8px; margin: 15px 0; }
        .search input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.9em; }
        .search button { padding: 12px 20px; border-radius: 10px; border: none; background: var(--green); color: #000; font-weight: 700; cursor: pointer; }
        .search button:hover { opacity: 0.9; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin: 15px 0; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; }
        .stat .val { font-size: 1.1em; font-weight: 900; color: var(--green); }
        .stat .lbl { font-size: 0.65em; color: var(--text2); text-transform: uppercase; margin-top: 3px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin: 12px 0; }
        h2 { color: var(--blue); font-size: 1.1em; margin-bottom: 12px; }

        .block-row, .tx-row { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85em; word-break: break-all; }
        .block-row:hover, .tx-row:hover { background: rgba(255,255,255,0.02); }
        .hash { color: var(--gold); font-family: monospace; font-size: 0.85em; }
        .addr { color: var(--blue); font-family: monospace; font-size: 0.8em; }
        .amount { color: var(--green); font-weight: 700; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 700; }
        .badge-green { background: rgba(16,185,129,0.15); color: var(--green); }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85em; }
        .detail-grid .lbl { color: var(--text2); }
        .detail-grid .val { font-weight: 600; word-break: break-all; }
        
        pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; font-size: 0.75em; overflow-x: auto; max-height: 400px; }
        .error { color: var(--red); text-align: center; padding: 20px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; background: var(--card); border: 2px solid transparent; font-size: 0.85em; }
        .tab.active { border-color: var(--green); color: var(--green); }
        .footer { text-align: center; color: var(--text2); font-size: 0.7em; padding: 20px; border-top: 1px solid var(--border); margin-top: 20px; }
        .footer a { color: var(--blue); text-decoration: none; }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🐏 RAMCOIN Explorer</span>
        <div class="status"><span class="dot"></span><span id="netStatus">Online</span></div>
    </nav>

    <div class="container">
        <!-- Поиск -->
        <div class="search">
            <input type="text" id="searchInput" placeholder="Block #, Hash, Address RAM_...">
            <button onclick="doSearch()">🔍 Search</button>
        </div>

        <!-- Статистика -->
        <div class="stats" id="statsRow"></div>

        <!-- Вкладки -->
        <div class="tabs">
            <span class="tab active" onclick="showTab('blocks')">📦 Blocks</span>
            <span class="tab" onclick="showTab('txs')">💸 Transactions</span>
            <span class="tab" onclick="showTab('top')">🏆 Top Accounts</span>
        </div>

        <!-- Контент -->
        <div id="content"></div>
    </div>

    <div class="footer">
        RAMCOIN v1.0.0 · <a href="https://github.com/ramcoinnode-debug/ramcoin">GitHub</a> · 
        <a href="https://t.me/ramcoin_pow">Telegram</a>
    </div>

    <script>
        const API = 'http://90.188.115.169:5000';
        let chainData = null;
        let currentTab = 'blocks';

        async function api(path) {
            try {
                const r = await fetch(`${API}${path}`);
                return await r.json();
            } catch(e) { return null; }
        }

        async function loadStats() {
            const d = await api('/chain');
            if (!d) {
                document.getElementById('netStatus').textContent = 'Offline';
                document.getElementById('statsRow').innerHTML = '<div class="error">Node offline</div>';
                return;
            }
            chainData = d;
            document.getElementById('netStatus').textContent = 'Online · H:' + d.height;
            const s = [
                {val:'#'+d.height, lbl:'Height'},
                {val:d.difficulty, lbl:'Difficulty'},
                {val:(d.total_supply||0).toFixed(0), lbl:'Supply RAM'},
                {val:d.accounts||0, lbl:'Accounts'},
                {val:d.transactions||0, lbl:'Txs'},
                {val:d.mempool||0, lbl:'Mempool'},
                {val:d.reward+' RAM', lbl:'Reward'},
                {val:((d.uptime||0)/3600).toFixed(1)+'h', lbl:'Uptime'},
            ];
            document.getElementById('statsRow').innerHTML = s.map(i=>
                `<div class="stat"><div class="val">${i.val}</div><div class="lbl">${i.lbl}</div></div>`
            ).join('');
            if (currentTab === 'blocks') showBlocks();
        }

        function showBlocks() {
            currentTab = 'blocks';
            updateTabs();
            if (!chainData || !chainData.chain) return;
            let html = '<h2>📦 Latest Blocks</h2>';
            chainData.chain.reverse().slice(0, 20).forEach(b => {
                html += `<div class="block-row">
                    <a href="javascript:showBlock(${b.index})" style="color:var(--green);font-weight:700;">#${b.index}</a>
                    <span class="badge badge-green">${b.pool_block?'POOL':'SOLO'}</span>
                    <span style="font-size:0.8em;color:var(--text2);">${new Date(b.timestamp*1000).toLocaleString()}</span>
                    <br><span class="hash">${(b.hash||'').substring(0,20)}...</span>
                    <span style="font-size:0.8em;">Txs: ${(b.transactions||[]).length} | Fees: ${(b.total_fees||0)/1e8} RAM</span>
                </div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        function showTxs() {
            currentTab = 'txs';
            updateTabs();
            if (!chainData || !chainData.chain) return;
            let txs = [];
            chainData.chain.forEach(b => {
                (b.transactions||[]).forEach(tx => {
                    txs.push({...tx, block: b.index, time: b.timestamp});
                });
            });
            txs.reverse();
            if (txs.length === 0) {
                document.getElementById('content').innerHTML = '<div class="card"><p style="color:var(--text2);">No transactions yet</p></div>';
                return;
            }
            let html = '<h2>💸 Latest Transactions</h2>';
            txs.slice(0, 30).forEach(tx => {
                html += `<div class="tx-row">
                    Block <a href="javascript:showBlock(${tx.block})" style="color:var(--green);">#${tx.block}</a>
                    <span style="font-size:0.8em;color:var(--text2);">${new Date(tx.time*1000).toLocaleString()}</span><br>
                    <span class="addr">${(tx.sender||'').substring(0,16)}...</span> → 
                    <span class="addr">${(tx.recipient||'').substring(0,16)}...</span><br>
                    <span class="amount">${(tx.amount||0)/1e8} RAM</span>
                    <span style="font-size:0.75em;color:var(--text2);">Fee: ${(tx.fee||0)/1e8} RAM</span>
                </div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        function showTop() {
            currentTab = 'top';
            updateTabs();
            if (!chainData) return;
            let html = '<h2>🏆 Top Accounts</h2><p style="color:var(--text2);font-size:0.8em;">Loading from API...</p>';
            document.getElementById('content').innerHTML = html;
            api('/top?limit=20').then(d => {
                if (!d || !Array.isArray(d)) {
                    document.getElementById('content').innerHTML = '<div class="card"><p style="color:var(--text2);">No data</p></div>';
                    return;
                }
                let h = '<h2>🏆 Top Accounts</h2>';
                d.forEach((a,i) => {
                    h += `<div class="block-row">
                        <span style="color:var(--gold);font-weight:700;">#${i+1}</span>
                        <span class="addr">${(a.address||'').substring(0,20)}...</span>
                        <span class="amount">${a.balance} RAM</span>
                    </div>`;
                });
                document.getElementById('content').innerHTML = h;
            });
        }

        async function showBlock(idx) {
            const b = await api('/block/'+idx);
            if (!b || b.error) {
                document.getElementById('content').innerHTML = '<div class="error">Block not found</div>';
                return;
            }
            currentTab = null;
            updateTabs();
            let h = `<div class="card">
                <h2>📦 Block #${b.index}</h2>
                <div class="detail-grid">
                    <div class="lbl">Hash:</div><div class="val hash">${b.hash||''}</div>
                    <div class="lbl">Previous:</div><div class="val hash">${b.previous_hash||''}</div>
                    <div class="lbl">Timestamp:</div><div class="val">${new Date(b.timestamp*1000).toLocaleString()}</div>
                    <div class="lbl">Miner:</div><div class="val addr">${(b.miner_payout_address||'').substring(0,30)}...</div>
                    <div class="lbl">Transactions:</div><div class="val">${(b.transactions||[]).length}</div>
                    <div class="lbl">Total Fees:</div><div class="val">${(b.total_fees||0)/1e8} RAM</div>
                    <div class="lbl">Dev Fund:</div><div class="val">${(b.dev_fund||0)/1e8} RAM</div>
                    <div class="lbl">Threads:</div><div class="val">${b.threads_used||'?'}</div>
                    <div class="lbl">Type:</div><div class="val">${b.pool_block?'POOL':'SOLO'}</div>
                </div>`;
            
            if (b.transactions && b.transactions.length > 0) {
                h += '<h3 style="margin-top:15px;">Transactions</h3>';
                b.transactions.forEach(tx => {
                    h += `<div class="tx-row">
                        <span class="addr">${(tx.sender||'').substring(0,20)}...</span> → 
                        <span class="addr">${(tx.recipient||'').substring(0,20)}...</span>
                        <span class="amount">${(tx.amount||0)/1e8} RAM</span>
                    </div>`;
                });
            }
            h += `<br><button onclick="showBlocks()" style="background:var(--card);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;">← Back to blocks</button></div>`;
            document.getElementById('content').innerHTML = h;
        }

        async function showAddress(addr) {
            const d = await api('/address/'+addr);
            if (!d || d.error) {
                document.getElementById('content').innerHTML = '<div class="error">Address not found</div>';
                return;
            }
            currentTab = null;
            updateTabs();
            document.getElementById('content').innerHTML = `<div class="card">
                <h2>💼 Address</h2>
                <div class="detail-grid">
                    <div class="lbl">Address:</div><div class="val addr">${d.address}</div>
                    <div class="lbl">Balance:</div><div class="val amount">${d.balance} RAM</div>
                    <div class="lbl">Nonce:</div><div class="val">${d.nonce||0}</div>
                </div>
                <br><button onclick="showBlocks()" style="background:var(--card);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;">← Back to blocks</button>
            </div>`;
        }

        function updateTabs() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (currentTab === 'blocks') document.querySelectorAll('.tab')[0].classList.add('active');
            if (currentTab === 'txs') document.querySelectorAll('.tab')[1].classList.add('active');
            if (currentTab === 'top') document.querySelectorAll('.tab')[2].classList.add('active');
        }

        function showTab(t) {
            if (t === 'blocks') showBlocks();
            if (t === 'txs') showTxs();
            if (t === 'top') showTop();
        }

        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            document.getElementById('content').innerHTML = '<div class="card"><p>Searching...</p></div>';
            
            if (/^\d+$/.test(q)) { showBlock(parseInt(q)); return; }
            if (q.startsWith('RAM_')) { showAddress(q); return; }
            if (q.length === 64) {
                // Try as block hash
                const b = await api('/block/'+q);
                if (b && !b.error) { showBlock(b.index); return; }
            }
            document.getElementById('content').innerHTML = '<div class="error">Not found. Try block number, hash, or RAM_ address.</div>';
        }

        function init() {
            loadStats();
            setInterval(loadStats, 30000);
        }
        init();
    </script>
</body>
</html>
