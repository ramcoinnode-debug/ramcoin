<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoDoc AI — ИИ-психолог для трейдеров</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; text-align: center; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px 30px; max-width: 500px; width: 100%; box-shadow: 0 0 30px rgba(0,255,0,0.05); }
        h1 { font-size: 28px; margin-bottom: 8px; color: #00ff88; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        .price { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; margin: 20px 0; }
        .price span { color: #00ff88; font-size: 24px; font-weight: bold; }
        .btn { display: inline-block; background: #00ff88; color: #000; padding: 14px 32px; font-size: 16px; font-weight: bold; text-decoration: none; border-radius: 8px; margin: 16px 0; transition: all 0.2s; }
        .btn:hover { background: #00cc66; transform: translateY(-1px); }
        .features { text-align: left; margin: 24px 0; }
        .features li { list-style: none; padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .features li::before { content: "✅ "; }
        .footer { color: #555; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧠 CryptoDoc AI</h1>
        <p class="subtitle">Искусственный интеллект, который не даст слить депозит</p>
        <ul class="features">
            <li>Помощь при тильте и панике</li>
            <li>Борьба с FOMO и жадностью</li>
            <li>Анонимно, 24/7</li>
            <li>Без финансовых советов</li>
        </ul>
        <div class="price">
            Подписка: <span>10 USDT</span> / месяц
        </div>
        <a href="https://t.me/CryptoDocAIbot" class="btn">🚀 Получить доступ</a>
        <p style="color: #666; font-size: 13px;">Оплата в USDT (BEP-20). После оплаты бот выдаст ключ.</p>
        <p class="footer">© 2026 CryptoDoc AI</p>
    </div>
</body>
</html>
